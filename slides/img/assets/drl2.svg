<polygon class="st29" points="96.9,443.9 105,447.9 100.1,455.5 "/>
<text transform="matrix(1 0 0 1 606.9575 765.1392)" class="st6 st24 st25">X</text>
<rect x="1224" y="105.3" class="st27" width="373" height="582"/>
<text transform="matrix(1 0 0 1 1224 122.4775)" class="st6 st24 st30">Prototypes can be an indispensable </text>
<text transform="matrix(1 0 0 1 1224 151.2776)" class="st6 st24 st30">tool for quickly evaluating the viability </text>
<text transform="matrix(1 0 0 1 1224 180.0775)" class="st6 st24 st30">of a design. They can also “kick” ideas </text>
<text transform="matrix(1 0 0 1 1224 208.8774)" class="st6 st24 st30">back to the exploratory and or prelimi</text>
<text transform="matrix(1 0 0 1 1589.2 208.8774)" class="st6 st24 st30">-</text>
<text transform="matrix(1 0 0 1 1224 237.6775)" class="st6 st24 st30">nary design stages (and also the bone</text>
<text transform="matrix(1 0 0 1 1588 237.6775)" class="st6 st24 st30">-</text>
<text transform="matrix(1 0 0 1 1224 266.4775)" class="st6 st24 st30">yard).</text>
<text transform="matrix(1 0 0 1 1224 324.0775)" class="st6 st24 st30">Therefore it is sometimes difficult to </text>
<text transform="matrix(1 0 0 1 1224 352.8774)" class="st6 st24 st30">put a hard timeline to when a proto</text>
<text transform="matrix(1 0 0 1 1568.5 352.8774)" class="st6 st24 st30">-</text>
<text transform="matrix(1 0 0 1 1224 381.6775)" class="st6 st24 st30">type idea will be “finished”.</text>
<text transform="matrix(1 0 0 1 1224 439.2775)" class="st6 st24 st30">To that end, the Design Team will </text>
<text transform="matrix(1 0 0 1 1224 468.0775)" class="st6 st24 st30">work towards defining timelines and </text>
<text transform="matrix(1 0 0 1 1224 496.8774)" class="st6 st24 st30">metrics for evaluating prototypes.</text>
</svg>
