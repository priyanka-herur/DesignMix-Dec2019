	<text transform="matrix(1 0 0 1 1224 122.4775)"><tspan x="0" y="0" class="st18 st19 st25">Prototypes can be an indispensable </tspan><tspan x="0" y="28.8" class="st18 st19 st25">tool for quickly evaluating the viability </tspan><tspan x="0" y="57.6" class="st18 st19 st25">of a design. They can also “kick” ideas </tspan><tspan x="0" y="86.4" class="st18 st19 st25">back to the exploratory and or prelimi</tspan><tspan x="365.2" y="86.4" class="st18 st19 st25">-</tspan><tspan x="0" y="115.2" class="st18 st19 st25">nary design stages (and also the bone</tspan><tspan x="364" y="115.2" class="st18 st19 st25">-</tspan><tspan x="0" y="144" class="st18 st19 st25">yard).</tspan><tspan x="0" y="201.6" class="st18 st19 st25">Therefore it is sometimes difficult to </tspan><tspan x="0" y="230.4" class="st18 st19 st25">put a hard timeline to when a proto</tspan><tspan x="344.5" y="230.4" class="st18 st19 st25">-</tspan><tspan x="0" y="259.2" class="st18 st19 st25">type idea will be “finished”.</tspan><tspan x="0" y="316.8" class="st18 st19 st25">To that end, the Design Team will </tspan><tspan x="0" y="345.6" class="st18 st19 st25">work towards defining timelines and </tspan><tspan x="0" y="374.4" class="st18 st19 st25">metrics for evaluating prototypes.</tspan></text>
</g>
</svg>
